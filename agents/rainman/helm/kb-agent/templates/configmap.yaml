apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kb-agent.fullname" . }}
  labels:
    {{- include "kb-agent.labels" . | nindent 4 }}
data:
  MODEL_ID: {{ .Values.config.modelId | quote }}
  KB_ROOT: {{ .Values.kb.root | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  PORT: {{ .Values.config.port | quote }}
