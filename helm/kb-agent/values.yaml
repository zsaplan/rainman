replicaCount: 1

image:
  repository: rainman
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000

config:
  modelId: openrouter/openai/gpt-5.4
  logLevel: info
  port: "3000"

kb:
  root: /app/kb
  bootstrapPath: /app/bootstrap-kb
  mount:
    enabled: true
  bootstrap:
    enabled: true
  extraVolumes: []
  extraVolumeMounts: []
  sidecars: []

secret:
  openRouterApiKey: change-me

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
