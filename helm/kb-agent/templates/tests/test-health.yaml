apiVersion: v1
kind: Pod
metadata:
  name: {{ include "kb-agent.fullname" . }}-test-health
  labels:
    {{- include "kb-agent.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.7.1
      command:
        - sh
        - -c
        - |
          set -eu
          curl -fsS http://{{ include "kb-agent.fullname" . }}:{{ .Values.service.port }}/healthz
          curl -fsS http://{{ include "kb-agent.fullname" . }}:{{ .Values.service.port }}/readyz
